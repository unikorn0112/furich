<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>馥韻容光</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  </style>
</head>
<body class="bg-gray-900 bg-opacity-40 flex justify-center items-center min-h-screen p-4">

  <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl flex flex-col overflow-hidden transform transition-all">
    
    <div class="p-5 border-b border-gray-100 text-center relative mt-2">
      <div class="text-xs text-gray-400 mb-1">unikorn0112.github.io</div>
      <h1 class="text-2xl font-bold text-gray-800 tracking-wide">馥韻容光｜課程報名</h1>
      </div>

    <div class="p-6 space-y-6 flex-grow">
      
      <div>
        <label class="block text-gray-800 font-bold text-base mb-2">
          姓名 <span class="text-red-500 text-sm font-normal">(請填寫正確大名，方便核對)</span>
        </label>
        <input type="text" id="userName" class="w-full px-4 py-3.5 border border-gray-300 rounded-lg text-gray-700 bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-green-600 transition" placeholder="陳民慶 | Chris">
      </div>

      <div>
        <label class="block text-gray-800 font-bold text-base mb-2">電話</label>
        <input type="tel" id="userPhone" class="w-full px-4 py-3.5 border border-gray-300 rounded-lg text-gray-700 bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-green-600 transition" placeholder="請輸入聯絡電話">
      </div>

      <div>
        <label class="block text-gray-800 font-bold text-base mb-2">報名課程</label>
        <div class="relative">
          <select id="courseSelect" onchange="handleCourseChange()" class="w-full px-4 py-3.5 border border-gray-300 rounded-lg text-gray-700 bg-white focus:outline-none focus:ring-2 focus:ring-green-600 transition appearance-none cursor-pointer">
            <option value="">請選擇報名課程</option>
          </select>
          <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
            ▼
          </div>
        </div>
      </div>

      <div>
        <label class="block text-gray-800 font-bold text-base mb-2">選擇場次</label>
        <div class="relative">
          <select id="timeSelect" onchange="handleTimeChange()" class="w-full px-4 py-3.5 border border-gray-300 rounded-lg text-gray-700 bg-gray-100 disabled:opacity-60 focus:outline-none focus:ring-2 focus:ring-green-600 transition appearance-none cursor-pointer" disabled>
            <option value="">請先選擇課程</option>
          </select>
          <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
            ▼
          </div>
        </div>
      </div>

      <div id="priceInfoBox" class="hidden bg-green-50 border border-green-200 rounded-xl p-4 flex justify-between items-center transition-all duration-200">
        <span class="text-gray-700 font-bold text-base">課程費用</span>
        <span class="text-xl font-black text-green-700" id="displayPrice">NT$ 0</span>
      </div>

    </div>

    <div class="p-6 pt-2 mb-2">
      <button id="submitBtn" onclick="submitForm()" class="w-full bg-green-600 text-white font-bold py-4 rounded-xl text-lg hover:bg-green-700 active:bg-green-800 transition duration-150 shadow-md block text-center tracking-wider">
        確認提交
      </button>
    </div>
  </div>

  <script>
    // ⚙️ 【核心配置區】
    const GAS_URL = "https://script.google.com/macros/s/AKfycbysgp4uHsRaGjII7g9SuFwED4p6iXIdj7nNEEI8Bs_pGvl6tue8Y-YXIXUnmN8TcNA/exec";
    const LIFF_ID = "2010515725-s5OM7bqy";

    let allCourses = []; 
    let userLineId = ""; 

    // 【1. 初始化 LIFF SDK】
    async function initLiff() {
      try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) {
          liff.login(); 
        } else {
          const profile = await liff.getProfile();
          userLineId = profile.userId; 
          fetchActiveCourses(); 
        }
      } catch (error) {
        console.error("LIFF 初始化失敗", error);
      }
    }

    // 【2. 從 GAS 撈取上架中的場次資料】
    async function fetchActiveCourses() {
      try {
        const res = await fetch(`${GAS_URL}?action=getCourses&onlyActive=true`);
        const result = await res.json();
        if (result.success) {
          allCourses = result.data; 
          renderCourseSelect();     
        }
      } catch (err) {
        alert("撈取線上場次清單失敗，請確認 GAS 是否有成功對外公開部署。");
      }
    }

    // 【3. 渲染『報名課程』下拉選單】
    function renderCourseSelect() {
      const courseSelect = document.getElementById('courseSelect');
      const uniqueTitles = [...new Set(allCourses.map(c => c.courseName))];
      
      uniqueTitles.forEach(title => {
        const opt = document.createElement('option');
        opt.value = title;
        opt.textContent = title;
        courseSelect.appendChild(opt);
      });
    }

    // 【4. 連動觸發場次選單】
    function handleCourseChange() {
      const selectedCourse = document.getElementById('courseSelect').value;
      const timeSelect = document.getElementById('timeSelect');
      const priceBox = document.getElementById('priceInfoBox');
      
      timeSelect.innerHTML = '<option value="">請選擇場次時間</option>';
      priceBox.classList.add('hidden'); 
      
      if (!selectedCourse) {
        timeSelect.disabled = true;
        timeSelect.classList.add('bg-gray-100');
        return;
      }

      const filteredTimes = allCourses.filter(c => c.courseName === selectedCourse);
      filteredTimes.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.courseTime;
        opt.dataset.price = c.price; 
        opt.textContent = c.courseTime; 
        timeSelect.appendChild(opt);
      });
      timeSelect.disabled = false; 
      timeSelect.classList.remove('bg-gray-100');
    }

    // 當學員選定特定「場次時間」後，自動連動抓出費用
    function handleTimeChange() {
      const timeSelect = document.getElementById('timeSelect');
      const priceBox = document.getElementById('priceInfoBox');
      const displayPrice = document.getElementById('displayPrice');
      
      if (!timeSelect.value) {
        priceBox.classList.add('hidden');
        return;
      }
      
      const selectedOption = timeSelect.options[timeSelect.selectedIndex];
      const price = selectedOption.dataset.price;
      
      if (price) {
        displayPrice.textContent = `NT$ ${price}`; 
        priceBox.classList.remove('hidden');       
      } else {
        priceBox.classList.add('hidden');
      }
    }

    // 【5. 按鈕點擊：處理表單提交】
    async function submitForm() {
      const name = document.getElementById('userName').value.trim();
      const phone = document.getElementById('userPhone').value.trim();
      const courseName = document.getElementById('courseSelect').value;
      const timeSelect = document.getElementById('timeSelect');
      const courseTime = timeSelect.value;
      
      if (!name || !phone || !courseName || !courseTime) {
        alert("請確認所有報名資料欄位皆已輸入或選擇！");
        return;
      }

      const selectedOption = timeSelect.options[timeSelect.selectedIndex];
      const price = selectedOption.dataset.price || "520";

      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;
      submitBtn.textContent = "資料提交中...";

      const payload = {
        action: "submitRegistration",
        data: { name, phone, courseName, courseTime, lineId: userLineId }
      };

      try {
        const res = await fetch(GAS_URL, {
          method: "POST",
          body: JSON.stringify(payload)
        });
        const result = await res.json();

        if (result.success) {
          const flexPayload = generateFlexPayload(courseName, courseTime, price);
          
          await liff.sendMessages([
            {
              type: "flex",
              altText: "【馥韻容光】活動報名憑證已送達！",
              contents: flexPayload
            }
          ]);
          
          liff.closeWindow(); 
        } else {
          alert("報名系統暫時無回應，請重新點擊提交。");
          submitBtn.disabled = false;
          submitBtn.textContent = "確認提交";
        }
      } catch (err) {
        console.error(err);
        alert("網路連線逾時，但資料可能已處理。請檢查 LINE 聊天室是否收到憑證。");
        submitBtn.disabled = false;
        submitBtn.textContent = "確認提交";
      }
    }

    // 【6. Flex Message 樣式模板產出器】
    function generateFlexPayload(title, timeStr, price) {
      let datePart = "當日";
      let timePart = timeStr;
      
      if(timeStr.includes(" ")) {
        const parts = timeStr.split(" ");
        datePart = parts[0] + (parts[1] ? " " + parts[1] : "");
        timePart = parts.slice(2).join(" ") || timeStr;
      }

      return {
        "type": "bubble",
        "size": "mega",
        "header": {
          "type": "box", "layout": "vertical",
          "contents": [
            { "type": "text", "text": "活動憑證", "color": "#FFFFFFB3", "size": "sm", "align": "center" },
            { "type": "text", "text": "馥韻容光", "weight": "bold", "color": "#FFFFFF", "size": "xxl", "align": "center", "margin": "sm" },
            { "type": "text", "text": `「 ${title} 」`, "color": "#FCD535", "size": "md", "align": "center", "margin": "md", "weight": "bold" },
            { "type": "separator", "color": "#FFFFFF33", "margin": "lg" }
          ],
          "backgroundColor": "#2A5235", "paddingTop": "25px", "paddingBottom": "15px"
        },
        "body": {
          "type": "box", "layout": "vertical",
          "contents": [
            {
              "type": "box", "layout": "horizontal",
              "contents": [
                {
                  "type": "box", "layout": "vertical",
                  "contents": [
                    { "type": "text", "text": "活動日期", "color": "#FFFFFF88", "size": "xs", "align": "center" },
                    { "type": "text", "text": datePart, "color": "#FFFFFF", "weight": "bold", "size": "md", "align": "center", "margin": "sm" }
                  ]
                },
                {
                  "type": "box", "layout": "vertical",
                  "contents": [
                    { "type": "text", "text": "體驗時間", "color": "#FFFFFF88", "size": "xs", "align": "center" },
                    { "type": "text", "text": timePart.replace("~","-"), "color": "#FFFFFF", "weight": "bold", "size": "xs", "align": "center", "margin": "sm", "wrap": true }
                  ]
                }
              ], "margin": "md"
            },
            { "type": "separator", "color": "#FFFFFF33", "margin": "lg" },
            {
              "type": "box", "layout": "vertical",
              "contents": [
                { "type": "text", "text": "📍 活動地點", "color": "#FCD535", "size": "sm", "weight": "bold" },
                { "type": "text", "text": "精選特配工作室（詳細地址依通知為主）", "color": "#FFFFFF", "size": "sm", "wrap": true, "margin": "xs" }
              ], "margin": "lg"
            },
            {
              "type": "box", "layout": "vertical",
              "contents": [
                { "type": "text", "text": "💰 上課費用 (現場繳費)", "color": "#FCD535", "size": "sm", "weight": "bold" },
                { "type": "text", "text": `NT$ ${price}`, "color": "#FCD535", "size": "xxl", "weight": "bold", "margin": "xs" }
              ], "margin": "md"
            }
          ],
          "backgroundColor": "#2A5235", "paddingTop": "10px", "paddingBottom": "20px"
        },
        "footer": {
          "type": "box", "layout": "vertical",
          "contents": [
            { "type": "text", "text": "💡 提醒：活動前 15 分鐘到場報到及繳費。", "color": "#333333", "size": "xs", "wrap": true, "align": "center" }
          ],
          "backgroundColor": "#FFFFFF", "paddingAll": "15px"
        }
      };
    }

    window.onload = () => { initLiff(); };
  </script>
</body>
</html>
