<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>馥韻容光</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .loader {
      border: 3px solid #f3f3f3;
      border-radius: 50%;
      border-top: 3px solid #16a34a;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body class="bg-gray-900 bg-opacity-40 flex justify-center items-center min-h-screen p-4">

  <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl flex flex-col overflow-hidden transform transition-all">
    
    <div class="p-5 border-b border-gray-100 text-center relative mt-2">
      <div class="text-xs text-gray-400 mb-1">unikorn0112.github.io</div>
      <h1 class="text-2xl font-bold text-gray-800 tracking-wide">馥韻容光｜課程報名</h1>
    </div>

    <div class="p-6 space-y-6 flex-grow">
      
      <div>
        <label class="block text-gray-800 font-bold text-base mb-2">
          姓名 <span class="text-red-500 text-sm font-normal">(請填寫正確大名，方便核對)</span>
        </label>
        <input type="text" id="userName" class="w-full px-4 py-3.5 border border-gray-300 rounded-lg text-gray-700 bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-green-600 transition" placeholder="陳民慶 | Chris">
      </div>

      <div>
        <label class="block text-gray-800 font-bold text-base mb-2">電話</label>
        <input type="tel" id="userPhone" class="w-full px-4 py-3.5 border border-gray-300 rounded-lg text-gray-700 bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-green-600 transition" placeholder="請輸入聯絡電話">
      </div>

      <div>
        <div class="flex justify-between items-center mb-2">
          <label class="block text-gray-800 font-bold text-base">報名課程</label>
          <div id="courseStatus" class="flex items-center space-x-2 text-sm text-green-600">
            <div class="loader"></div>
            <span>線上場次載入中...</span>
          </div>
        </div>
        <div class="relative">
          <select id="courseSelect" onchange="handleCourseChange()" class="w-full px-4 py-3.5 border border-gray-300 rounded-lg text-gray-400 bg-gray-100 focus:outline-none focus:ring-2 focus:ring-green-600 transition appearance-none cursor-pointer" disabled>
            <option value="">請稍候，正同步線上課程...</option>
          </select>
          <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
            ▼
          </div>
        </div>
      </div>

      <div>
        <label class="block text-gray-800 font-bold text-base mb-2">選擇場次</label>
        <div class="relative">
          <select id="timeSelect" onchange="handleTimeChange()" class="w-full px-4 py-3.5 border border-gray-300 rounded-lg text-gray-700 bg-gray-100 disabled:opacity-60 focus:outline-none focus:ring-2 focus:ring-green-600 transition appearance-none cursor-pointer" disabled>
            <option value="">請先選擇課程</option>
          </select>
          <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
            ▼
          </div>
        </div>
      </div>

      <div id="priceInfoBox" class="hidden bg-green-50 border border-green-200 rounded-xl p-4 flex justify-between items-center transition-all duration-200">
        <span class="text-gray-700 font-bold text-base">課程費用</span>
        <span class="text-xl font-black text-green-700" id="displayPrice">NT$ 0</span>
      </div>

      <div id="locationInfoBox" class="hidden bg-gray-50 border border-gray-200 rounded-xl p-4 flex flex-col transition-all duration-200">
        <span class="text-gray-700 font-bold text-base mb-1">📍 活動地點</span>
        <span class="text-gray-600 text-sm leading-relaxed" id="displayLocation"></span>
      </div>

    </div>

    <div class="p-6 pt-2 mb-2">
      <button id="submitBtn" onclick="submitForm()" class="w-full bg-green-600 text-white font-bold py-4 rounded-xl text-lg hover:bg-green-700 active:bg-green-800 transition duration-150 shadow-md block text-center tracking-wider">
        確認提交
      </button>
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbysgp4uHsRaGjII7g9SuFwED4p6iXIdj7nNEEI8Bs_pGvl6tue8Y-YXIXUnmN8TcNA/exec";
    const LIFF_ID = "2010515725-s5OM7bqy";

    let allCourses = []; 
    let userLineId = ""; 

    async function initLiff() {
      try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) {
          liff.login(); 
        } else {
          const profile = await liff.getProfile();
          userLineId = profile.userId; 
          fetchActiveCourses(); 
        }
      } catch (error) {
        console.error("LIFF 初始化失敗", error);
      }
    }

    async function fetchActiveCourses() {
      try {
        const res = await fetch(`${GAS_URL}?action=getCourses&onlyActive=true`);
        const result = await res.json();
        if (result.success) {
          allCourses = result.data; 
          renderCourseSelect();     
        }
      } catch (err) {
        document.getElementById('courseStatus').innerHTML = '<span class="text-red-500">同步失敗，請重開網頁</span>';
      }
    }

    function renderCourseSelect() {
      const courseSelect = document.getElementById('courseSelect');
      const courseStatus = document.getElementById('courseStatus');
      
      courseSelect.innerHTML = '<option value="">請選擇報名課程</option>';
      courseSelect.disabled = false;
      courseSelect.classList.remove('bg-gray-100', 'text-gray-400');
      courseSelect.classList.add('bg-white', 'text-gray-700');
      courseStatus.classList.add('hidden');
      
      const uniqueTitles = [...new Set(allCourses.map(c => c.courseName))];
      uniqueTitles.forEach(title => {
        const opt = document.createElement('option');
        opt.value = title;
        opt.textContent = title;
        courseSelect.appendChild(opt);
      });
    }

    function handleCourseChange() {
      const selectedCourse = document.getElementById('courseSelect').value;
      const timeSelect = document.getElementById('timeSelect');
      const priceBox = document.getElementById('priceInfoBox');
      const locationBox = document.getElementById('locationInfoBox'); 
      
      timeSelect.innerHTML = '<option value="">請選擇場次時間</option>';
      priceBox.classList.add('hidden'); 
      locationBox.classList.add('hidden'); 
      
      if (!selectedCourse) {
        timeSelect.disabled = true;
        timeSelect.classList.add('bg-gray-100');
        return;
      }

      const filteredTimes = allCourses.filter(c => c.courseName === selectedCourse);
      filteredTimes.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.courseTime;
        opt.dataset.price = c.price; 
        opt.dataset.location = c.location && c.location.trim() !== "" ? c.location : "精選特配工作室（詳細地址依通知為主）"; 
        opt.textContent = c.courseTime; 
        timeSelect.appendChild(opt);
      });
      timeSelect.disabled = false; 
      timeSelect.classList.remove('bg-gray-100');
    }

    function handleTimeChange() {
      const timeSelect = document.getElementById('timeSelect');
      const priceBox = document.getElementById('priceInfoBox');
      const displayPrice = document.getElementById('displayPrice');
      
      const locationBox = document.getElementById('locationInfoBox'); 
      const displayLocation = document.getElementById('displayLocation'); 
      
      if (!timeSelect.value) {
        priceBox.classList.add('hidden');
        locationBox.classList.add('hidden');
        return;
      }
      
      const selectedOption = timeSelect.options[timeSelect.selectedIndex];
      const price = selectedOption.dataset.price;
      const location = selectedOption.dataset.location; 
      
      if (price) {
        displayPrice.textContent = `NT$ ${price}`; 
        priceBox.classList.remove('hidden');       
      } else {
        priceBox.classList.add('hidden');
      }

      if (location) {
        displayLocation.textContent = location;
        locationBox.classList.remove('hidden');
      } else {
        locationBox.classList.add('hidden');
      }
    }

    async function submitForm() {
      const name = document.getElementById('userName').value.trim();
      const phone = document.getElementById('userPhone').value.trim();
      const courseName = document.getElementById('courseSelect').value;
      const timeSelect = document.getElementById('timeSelect');
      const courseTime = timeSelect.value;
      
      if (!name || !phone || !courseName || !courseTime) {
        alert("請確認所有報名資料欄位皆已輸入或選擇！");
        return;
      }

      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;
      submitBtn.textContent = "資料提交中...";

      const selectedOption = timeSelect.options[timeSelect.selectedIndex];
      const price = selectedOption.dataset.price || "0";
      const location = selectedOption.dataset.location; 

      const payload = {
        action: "submitRegistration",
        data: { name, phone, payment: "現場繳費", courseName, courseTime, price, lineId: userLineId }
      };

      fetch(GAS_URL, {
        method: "POST",
        body: JSON.stringify(payload)
      }).catch(err => console.log("Background logging:", err));

      setTimeout(async () => {
        try {
          const flexPayload = generateFlexPayload(courseName, courseTime, price, location);
          
          await liff.sendMessages([
            {
              type: "flex",
              altText: "【馥韻容光】活動報名憑證已送達！",
              contents: flexPayload
            }
          ]);
          
          alert("🎉 報名預約成功！\n專屬體驗憑證卡片已發送至您的 LINE 聊天室。");
          liff.closeWindow(); 
          
        } catch (flexErr) {
          console.error(flexErr);
          alert("🎉 報名成功！");
          liff.closeWindow();
        }
      }, 1200); 
    }

    function generateFlexPayload(title, timeStr, price, locationStr) {
      return {
        "type": "bubble",
        "size": "mega",
        "header": {
          "type": "box",
          "layout": "vertical",
          "contents": [
            { "type": "text", "text": "馥韻容光｜活動憑證", "color": "#FFFFFFB3", "size": "lg", "align": "center", "weight": "bold" },
            { "type": "text", "text": title, "weight": "bold", "color": "#FCD535", "size": "xl", "align": "center", "margin": "md", "wrap": true },
            { "type": "separator", "color": "#FFFFFF33", "margin": "lg" }
          ],
          "backgroundColor": "#2A5235",
          "paddingTop": "25px",
          "paddingBottom": "20px"
        },
        "body": {
          "type": "box",
          "layout": "vertical",
          "contents": [
            // ✨【修正點：將 size: "x1" 改回正常的 "xl"】
            { "type": "text", "text": "活動日期｜時間", "color": "#FFFFFF88", "size": "xl", "align": "center", "weight": "bold" },
            { "type": "text", "text": timeStr, "color": "#FFFFFF", "weight": "bold", "size": "xl", "align": "center", "margin": "sm", "wrap": true },
            { "type": "separator", "color": "#FFFFFF33", "margin": "xl" },
            {
              "type": "box",
              "layout": "vertical",
              "contents": [
                { "type": "text", "text": "💰 課程費用（現場繳費）", "color": "#FFFFFF88", "size": "xs" },
                { "type": "text", "text": `NT$ ${price}`, "color": "#FCD535", "size": "xl", "weight": "bold", "margin": "xs" },
                { "type": "text", "text": "📍 活動地點", "color": "#FFFFFF88", "size": "xs", "margin": "md" },
                { "type": "text", "text": locationStr, "color": "#FFFFFF", "size": "sm", "wrap": true, "margin": "xs" }
              ],
              "margin": "lg"
            }
          ],
          "backgroundColor": "#2A5235",
          "paddingTop": "15px",
          "paddingBottom": "25px"
        },
        "footer": {
          "type": "box",
          "layout": "vertical",
          "contents": [
            { "type": "text", "text": "💡 提醒：活動前 15 分鐘到場及繳費。", "color": "#333333", "size": "xs", "wrap": true, "align": "center" }
          ],
          "backgroundColor": "#FFFFFF",
          "paddingAll": "15px"
        }
      };
    }

    window.onload = () => { initLiff(); };
  </script>
</body>
</html>
